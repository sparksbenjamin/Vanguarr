services:
  vanguarr:
    build:
      context: .
    container_name: vanguarr
    restart: unless-stopped
    ports:
      - "${VANGUARR_PORT:-8000}:8000"
    # Optional for host-based Ollama on Docker/Unraid:
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"
    environment:
      APP_NAME: "${APP_NAME:-Vanguarr}"
      APP_ENV: "${APP_ENV:-production}"
      APP_HOST: "${APP_HOST:-0.0.0.0}"
      APP_PORT: "8000"
      TZ: "${TZ:-America/New_York}"
      DATA_DIR: "${DATA_DIR:-/data}"
      DATABASE_URL: "${DATABASE_URL:-sqlite:////data/vanguarr.db}"
      PROFILES_DIR: "${PROFILES_DIR:-/data/profiles}"
      LOGS_DIR: "${LOGS_DIR:-/data/logs}"
      LOG_FILE: "${LOG_FILE:-/data/logs/vanguarr.log}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      GLOBAL_EXCLUSIONS: "${GLOBAL_EXCLUSIONS:-No Horror,No Reality TV}"
      REQUEST_THRESHOLD: "${REQUEST_THRESHOLD:-0.72}"
      SCHEDULER_ENABLED: "${SCHEDULER_ENABLED:-true}"
      PROFILE_CRON: "${PROFILE_CRON:-0 3 * * 0}"
      DECISION_CRON: "${DECISION_CRON:-0 4 * * *}"
      LIBRARY_SYNC_ENABLED: "${LIBRARY_SYNC_ENABLED:-true}"
      LIBRARY_SYNC_CRON: "${LIBRARY_SYNC_CRON:-0 */4 * * *}"
      SUGGESTIONS_ENABLED: "${SUGGESTIONS_ENABLED:-true}"
      SUGGESTIONS_LIMIT: "${SUGGESTIONS_LIMIT:-20}"
      HEALTH_CACHE_SECONDS: "${HEALTH_CACHE_SECONDS:-30}"
      PROFILE_HISTORY_LIMIT: "${PROFILE_HISTORY_LIMIT:-40}"
      PROFILE_ARCHITECT_MAX_OUTPUT_TOKENS: "${PROFILE_ARCHITECT_MAX_OUTPUT_TOKENS:-384}"
      PROFILE_ARCHITECT_TOP_TITLES_LIMIT: "${PROFILE_ARCHITECT_TOP_TITLES_LIMIT:-8}"
      PROFILE_ARCHITECT_RECENT_MOMENTUM_LIMIT: "${PROFILE_ARCHITECT_RECENT_MOMENTUM_LIMIT:-5}"
      PROFILE_LLM_ENRICHMENT_ENABLED: "${PROFILE_LLM_ENRICHMENT_ENABLED:-true}"
      PROFILE_LLM_ENRICHMENT_MAX_OUTPUT_TOKENS: "${PROFILE_LLM_ENRICHMENT_MAX_OUTPUT_TOKENS:-120}"
      CANDIDATE_LIMIT: "${CANDIDATE_LIMIT:-160}"
      TRENDING_CANDIDATE_LIMIT: "${TRENDING_CANDIDATE_LIMIT:-100}"
      DECISION_SHORTLIST_LIMIT: "${DECISION_SHORTLIST_LIMIT:-15}"
      RECOMMENDATION_SEED_LIMIT: "${RECOMMENDATION_SEED_LIMIT:-6}"
      TMDB_SEED_ENRICHMENT_LIMIT: "${TMDB_SEED_ENRICHMENT_LIMIT:-6}"
      TMDB_CANDIDATE_ENRICHMENT_LIMIT: "${TMDB_CANDIDATE_ENRICHMENT_LIMIT:-30}"
      DECISION_PAGE_SIZE: "${DECISION_PAGE_SIZE:-100}"
      MEDIA_SERVER_PROVIDER: "${MEDIA_SERVER_PROVIDER:-jellyfin}"
      JELLYFIN_BASE_URL: "${JELLYFIN_BASE_URL:-}"
      JELLYFIN_API_KEY: "${JELLYFIN_API_KEY:-}"
      PLEX_BASE_URL: "${PLEX_BASE_URL:-}"
      PLEX_API_TOKEN: "${PLEX_API_TOKEN:-}"
      PLEX_CLIENT_IDENTIFIER: "${PLEX_CLIENT_IDENTIFIER:-vanguarr}"
      SEER_BASE_URL: "${SEER_BASE_URL:-}"
      SEER_API_KEY: "${SEER_API_KEY:-}"
      SEER_REQUEST_USER_ID: "${SEER_REQUEST_USER_ID:-}"
      SEER_WEBHOOK_TOKEN: "${SEER_WEBHOOK_TOKEN:-}"
      SUGGESTIONS_API_KEY: "${SUGGESTIONS_API_KEY:-}"
      TMDB_BASE_URL: "${TMDB_BASE_URL:-https://api.themoviedb.org/3}"
      TMDB_API_READ_ACCESS_TOKEN: "${TMDB_API_READ_ACCESS_TOKEN:-}"
      TMDB_API_KEY: "${TMDB_API_KEY:-}"
      TMDB_LANGUAGE: "${TMDB_LANGUAGE:-en-US}"
      TMDB_WATCH_REGION: "${TMDB_WATCH_REGION:-US}"
      LLM_PROVIDER: "${LLM_PROVIDER:-ollama}"
      LLM_MODEL: "${LLM_MODEL:-ollama/llama3.1:8b}"
      LLM_TEMPERATURE: "${LLM_TEMPERATURE:-0.2}"
      LLM_MAX_OUTPUT_TOKENS: "${LLM_MAX_OUTPUT_TOKENS:-700}"
      LLM_TIMEOUT_SECONDS: "${LLM_TIMEOUT_SECONDS:-}"
      OLLAMA_API_BASE: "${OLLAMA_API_BASE:-http://ollama:11434}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_API_BASE: "${OPENAI_API_BASE:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ANTHROPIC_API_BASE: "${ANTHROPIC_API_BASE:-}"
    volumes:
      - "${VANGUARR_DATA_PATH:-./data}:/data"
