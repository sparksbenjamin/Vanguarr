services:
  vanguarr:
    build:
      context: .
    container_name: vanguarr
    restart: unless-stopped
    ports:
      - "${VANGUARR_PORT:-8000}:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      APP_NAME: "${APP_NAME:-Vanguarr}"
      APP_ENV: "${APP_ENV:-production}"
      APP_HOST: "${APP_HOST:-0.0.0.0}"
      APP_PORT: "8000"
      TZ: "${TZ:-America/New_York}"
      DATA_DIR: "${DATA_DIR:-/app/data}"
      DATABASE_URL: "${DATABASE_URL:-sqlite:////app/data/vanguarr.db}"
      PROFILES_DIR: "${PROFILES_DIR:-/app/data/profiles}"
      LOGS_DIR: "${LOGS_DIR:-/app/data/logs}"
      LOG_FILE: "${LOG_FILE:-/app/data/logs/vanguarr.log}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      GLOBAL_EXCLUSIONS: "${GLOBAL_EXCLUSIONS:-No Horror,No Reality TV}"
      REQUEST_THRESHOLD: "${REQUEST_THRESHOLD:-0.72}"
      SCHEDULER_ENABLED: "${SCHEDULER_ENABLED:-true}"
      PROFILE_CRON: "${PROFILE_CRON:-0 3 * * 0}"
      DECISION_CRON: "${DECISION_CRON:-0 4 * * *}"
      HEALTH_CACHE_SECONDS: "${HEALTH_CACHE_SECONDS:-30}"
      PROFILE_HISTORY_LIMIT: "${PROFILE_HISTORY_LIMIT:-40}"
      PROFILE_ARCHITECT_MAX_OUTPUT_TOKENS: "${PROFILE_ARCHITECT_MAX_OUTPUT_TOKENS:-384}"
      CANDIDATE_LIMIT: "${CANDIDATE_LIMIT:-25}"
      RECOMMENDATION_SEED_LIMIT: "${RECOMMENDATION_SEED_LIMIT:-3}"
      DECISION_PAGE_SIZE: "${DECISION_PAGE_SIZE:-100}"
      JELLYFIN_BASE_URL: "${JELLYFIN_BASE_URL:-}"
      JELLYFIN_API_KEY: "${JELLYFIN_API_KEY:-}"
      SEER_BASE_URL: "${SEER_BASE_URL:-}"
      SEER_API_KEY: "${SEER_API_KEY:-}"
      SEER_REQUEST_USER_ID: "${SEER_REQUEST_USER_ID:-}"
      LLM_PROVIDER: "${LLM_PROVIDER:-ollama}"
      LLM_MODEL: "${LLM_MODEL:-ollama/llama3.1:8b}"
      LLM_TEMPERATURE: "${LLM_TEMPERATURE:-0.2}"
      LLM_MAX_OUTPUT_TOKENS: "${LLM_MAX_OUTPUT_TOKENS:-700}"
      LLM_TIMEOUT_SECONDS: "${LLM_TIMEOUT_SECONDS:-}"
      OLLAMA_API_BASE: "${OLLAMA_API_BASE:-http://host.docker.internal:11434}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_API_BASE: "${OPENAI_API_BASE:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ANTHROPIC_API_BASE: "${ANTHROPIC_API_BASE:-}"
    volumes:
      - "${VANGUARR_DATA_PATH:-./data}:/app/data"
