<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page_title or "Vanguarr" }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --sand: #f6f0e3;
        --paper: rgba(255, 252, 246, 0.88);
        --ink: #17212c;
        --ink-soft: #556170;
        --line: rgba(23, 33, 44, 0.12);
        --teal: #0f7c82;
        --amber: #c68b2c;
        --green: #1a8f58;
        --red: #b4463d;
        --panel-shadow: 0 22px 60px rgba(23, 33, 44, 0.12);
      }

      body {
        font-family: "Space Grotesk", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(15, 124, 130, 0.16), transparent 32%),
          radial-gradient(circle at top right, rgba(198, 139, 44, 0.18), transparent 36%),
          linear-gradient(160deg, #f8f3e8 0%, #edf1f1 54%, #f8f3e8 100%);
      }

      code,
      pre,
      .mono {
        font-family: "IBM Plex Mono", monospace;
      }

      .panel {
        background: var(--paper);
        border: 1px solid var(--line);
        box-shadow: var(--panel-shadow);
        backdrop-filter: blur(14px);
      }
    </style>
  </head>
  <body class="min-h-screen">
    <div class="mx-auto flex min-h-screen w-full max-w-7xl flex-col px-4 py-6 sm:px-6 lg:px-8">
      <header class="panel mb-6 rounded-[2rem] px-5 py-5 sm:px-8">
        <div class="flex flex-col gap-5 lg:flex-row lg:items-end lg:justify-between">
          <div>
            <p class="mono text-xs uppercase tracking-[0.35em] text-[var(--teal)]">Security-minded media bridge</p>
            <h1 class="mt-2 text-3xl font-bold tracking-tight sm:text-4xl">Vanguarr</h1>
            <p class="mt-2 max-w-3xl text-sm text-[var(--ink-soft)] sm:text-base">
              Proactive curation for Jellyfin and Seer, driven by persistent LLM personas and fuzz-tested candidate payloads.
            </p>
          </div>
          <nav class="flex flex-wrap gap-2 text-sm">
            <a class="rounded-full border border-[var(--line)] px-4 py-2 transition hover:border-[var(--teal)] hover:text-[var(--teal)]" href="/">Dashboard</a>
            <a class="rounded-full border border-[var(--line)] px-4 py-2 transition hover:border-[var(--teal)] hover:text-[var(--teal)]" href="/logs">War Room</a>
            <a class="rounded-full border border-[var(--line)] px-4 py-2 transition hover:border-[var(--teal)] hover:text-[var(--teal)]" href="/manifest">Manifest Editor</a>
          </nav>
        </div>
      </header>

      {% if toast %}
      <div class="mb-6 rounded-3xl border border-[var(--line)] bg-white/75 px-5 py-4 text-sm text-[var(--ink)] shadow-sm">
        {{ toast }}
      </div>
      {% endif %}

      <main class="flex-1">
        {% block content %}{% endblock %}
      </main>
    </div>

    {% block scripts %}{% endblock %}
  </body>
</html>
